name = "edgeforce-crm-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[observability]
enabled = true

[vars]
ENV = "production"

# Durable Objects migrations
[[migrations]]
tag = "v1"
new_sqlite_classes = [ "WebSocketServer" ]

# Durable Objects for WebSocket
[[durable_objects.bindings]]
name = "WEBSOCKET"
class_name = "WebSocketServer"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "edgeforce-crm-db"
database_id = "f221d95b-99d5-4147-bf84-da888ee3d94b"

# KV bindings - using existing namespaces
[[kv_namespaces]]
binding = "SESSIONS"
id = "d6aa41f7a0294edb9594c56d0a74f77b"

[[kv_namespaces]]
binding = "CACHE"
id = "9e1cb9202d884c32a9fa653cbd45e63c"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "62fb4d47abb645788db1aa889338a34d"

# R2 bindings
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "edgeforce-crm-assets"

# AI Gateway binding
[ai]
binding = "AI"